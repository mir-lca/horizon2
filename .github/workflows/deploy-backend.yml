name: Deploy Backend (Azure Functions)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Backend to Azure Functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=shared --cov-report=term-missing || true

      - name: Create deployment package
        working-directory: backend
        run: |
          zip -r ../backend.zip . -x "*.pyc" -x "*__pycache__*" -x "*.git*" -x "tests/*"

      - name: Deploy to Azure Functions via ZipDeploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          # Extract credentials from publish profile
          echo "$PUBLISH_PROFILE" > publish-profile.xml
          USERNAME=$(grep -oPm1 "(?<=userName=\")[^\"]+(?=\")" publish-profile.xml)
          PASSWORD=$(grep -oPm1 "(?<=userPWD=\")[^\"]+(?=\")" publish-profile.xml)
          rm publish-profile.xml

          # Deploy using ZipDeploy API
          curl -X POST \
            -u "$USERNAME:$PASSWORD" \
            --data-binary @backend.zip \
            -H "Content-Type: application/zip" \
            https://horizon-func-1769161979.scm.azurewebsites.net/api/zipdeploy?isAsync=false

          rm backend.zip

      - name: Verify deployment
        run: |
          echo "Backend deployed successfully!"
          echo "API URL: https://horizon-func-1769161979.azurewebsites.net/api"

          curl -f https://horizon-func-1769161979.azurewebsites.net/api/health || echo "Health check endpoint not available"
